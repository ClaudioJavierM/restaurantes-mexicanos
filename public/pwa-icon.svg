<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo rojo (color tema de FMR) -->
  <rect width="512" height="512" fill="#DC2626" rx="80"/>

  <!-- Decoración mexicana - Franja verde -->
