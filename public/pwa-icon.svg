  <!-- Texto FMR -->
  <text x="256" y="300" font-family="Arial, sans-serif" font-size="160" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
    FMR
  </text>

  <!-- Subtítulo -->
  <text x="256" y="380" font-family="Arial, sans-serif" font-size="48" fill="#FFFFFF" text-anchor="middle" opacity="0.9">
